# ============================================================
# nginx endurecido — sirve el juego estático y proxea /api a la API
# Se monta sobre /etc/nginx/conf.d/default.conf (contexto http).
# ============================================================

# Rate-limit para la API (por IP)
limit_req_zone $binary_remote_addr zone=apilim:10m rate=10r/s;
limit_req_status 429;

# Límite de conexiones simultáneas por IP
limit_conn_zone $binary_remote_addr zone=connlim:10m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Endurecimiento básico ---
    server_tokens off;                      # oculta la versión de nginx
    client_max_body_size 8k;                # cuerpos chicos (juego estático + API mínima)
    client_body_timeout 10s;
    client_header_timeout 10s;
    limit_conn connlim 20;

    # --- Cabeceras de seguridad (aplican a todas las respuestas) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

    # --- Compresión ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # --- API (reverse proxy con rate-limit y métodos restringidos) ---
    location /api/ {
        limit_req zone=apilim burst=20 nodelay;
        limit_except GET POST OPTIONS { deny all; }

        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # --- Bloquear archivos ocultos (.git, .env, etc.) ---
    location ~ /\. {
        deny all;
        return 404;
    }

    # --- Juego estático ---
    location / {
        try_files $uri $uri/ =404;
    }
}
